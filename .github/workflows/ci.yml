name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # SessionStore conformance 需要真的 PostgreSQL，因為我們要驗證跨 Pod persistence adapter，
    # 不是只做 source inspection。
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agent_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agent_test

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run pytest -q
