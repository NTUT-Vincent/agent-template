services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build: .
    env_file: .env
    command: uvicorn agent_runtime.api.main:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}

  worker:
    build: .
    env_file: .env
    command: celery -A agent_runtime.tasks.celery_app.celery_app worker -l INFO --concurrency=2
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}
