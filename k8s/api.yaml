# API Deployment
#
# 這組 Pod 同時承載：
#   - FastAPI Internal REST
#   - A2A Agent Card
#   - A2A JSON-RPC endpoint
#
# Pod 本身應盡量 stateless。
# Durable state 分別放在 PostgreSQL / Redis 等外部服務。

apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-runtime-api
spec:
  # 多 replica 的前提是不能把重要 session/state 只放在 Pod local memory/disk。
  replicas: 2
  selector:
    matchLabels: {app: agent-runtime-api}
  template:
    metadata:
      labels: {app: agent-runtime-api}
    spec:
      containers:
        - name: api
          # 請替換成公司實際 image registry/tag。
          image: ghcr.io/REPLACE_ME/agent-runtime-platform:latest
          ports: [{containerPort: 8000}]

          # 非敏感設定放 ConfigMap；secret/API key/database credential 放 Secret。
          envFrom:
            - configMapRef: {name: agent-runtime-config}
            - secretRef: {name: agent-runtime-secrets}

          # /health 是 operations endpoint，不是 A2A protocol endpoint。
          readinessProbe:
            httpGet: {path: /health, port: 8000}
          livenessProbe:
            httpGet: {path: /health, port: 8000}

---

# Kubernetes Service 只把流量導向 API Pods。
# Production 通常還會在前面接 Ingress / Gateway / Service Mesh。
apiVersion: v1
kind: Service
metadata:
  name: agent-runtime-api
spec:
  selector: {app: agent-runtime-api}
  ports:
    - port: 80
      targetPort: 8000
